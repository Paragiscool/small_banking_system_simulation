version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://zetheta:zetheta_password@db:5432/zetheta_core
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=zetheta
      - POSTGRES_PASSWORD=zetheta_password
      - POSTGRES_DB=zetheta_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zetheta -d zetheta_core"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
