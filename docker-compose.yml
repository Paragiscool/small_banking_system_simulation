version: '3.8'
services:
  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: open_banking_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis_db:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
